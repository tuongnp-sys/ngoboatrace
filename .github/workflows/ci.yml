name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run icons

      - run: npm run build
        env:
          VITE_API_URL: https://example.onrender.com
          VITE_APP_VERSION: 0.1.0
